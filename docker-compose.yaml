services:
#  entrymanager-transaction-api:
#    image: entrymanager-transaction-api:dev
#    build:
#      context: .
#      dockerfile: src/transaction/EntryManager.Transaction.Api/Dockerfile
  
  kafka-zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: kafka-zookeeper
    hostname: kafka-zookeeper
    user: "0:0" # 👈 executa como root
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes: 
      - ./docker/volumes/kafka-zookeeper/log:/var/lib/zookeeper/log
      - ./docker/volumes/kafka-zookeeper/data:/var/lib/zookeeper/data
      - ./docker/volumes/kafka-zookeeper/secrets:/etc/zookeeper/secrets

  kafka-broker:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-broker
    hostname: kafka-broker
    user: "0:0" # 👈 executa como root
    depends_on:
      - kafka-zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_ZOOKEEPER_CONNECT: kafka-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://kafka-broker:29092,CONTROLLER://kafka-broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./docker/volumes/kafka-broker/data:/var/lib/kafka/data
      - ./docker/volumes/kafka-broker/secrets:/etc/kafka/secrets
   
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    depends_on:
      - kafka-broker
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: kafka-zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
    volumes:
      - ./docker/volumes/kafka-ui:/etc/kafkaui/config
      - ./docker/volumes/kafka-ui:/var/log/kafkaui